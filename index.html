<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
  <title>ライン動画ちっちゃ君</title>
  
  <!-- PWA Settings -->
  <link rel="manifest" href="manifest.webmanifest">
  <meta name="theme-color" content="#0f172a">
  <meta name="mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <meta name="apple-mobile-web-app-title" content="ちっちゃ君">
  <link rel="apple-touch-icon" href="icon.png">
  
  <!-- SEO -->
  <meta name="description" content="スマートフォン上で動画をLINE送信向けに「超シンプル」に最適圧縮するPWAアプリ。外部に動画を送信せず、端末内だけで完結する安全なエンコーダーです。">
  
  <!-- インラインプレミアムCSSシステム -->
  <style>
    :root {
      --bg-start: #0f172a;
      --bg-end: #1e293b;
      --card-bg: #1e293b;
      --primary: #10b981;
      --primary-hover: #059669;
      --primary-glow: rgba(16, 185, 129, 0.3);
      --text-main: #f8fafc;
      --text-secondary: #94a3b8;
      --border-color: #334155;
    }

    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, "Helvetica Neue", Arial, sans-serif;
    }

    body {
      background: linear-gradient(135deg, var(--bg-start), var(--bg-end));
      color: var(--text-main);
      min-height: 100vh;
      display: flex;
      justify-content: center;
      align-items: center;
      padding: 16px;
      overflow-x: hidden;
    }

    .app-container {
      width: 100%;
      max-width: 480px;
      padding: 24px;
      display: flex;
      flex-direction: column;
      gap: 20px;
    }

    header {
      text-align: center;
      margin-bottom: 8px;
    }

    header h1 {
      font-size: 1.8rem;
      font-weight: 800;
      letter-spacing: -0.025em;
      margin-bottom: 6px;
      background: linear-gradient(to right, #34d399, #10b981);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
    }

    header p {
      color: var(--text-secondary);
      font-size: 0.85rem;
    }

    .card {
      background-color: var(--card-bg);
      border-radius: 20px;
      padding: 24px;
      border: 1px solid var(--border-color);
      box-shadow: 0 10px 25px -5px rgba(0, 0, 0, 0.3), 0 8px 10px -6px rgba(0, 0, 0, 0.3);
      display: flex;
      flex-direction: column;
      gap: 20px;
    }

    /* インストール促進エリア */
    .install-area {
      display: flex;
      flex-direction: column;
      gap: 8px;
      margin-bottom: 8px;
    }

    .install-btn {
      background-color: #3b82f6;
      border: none;
      border-radius: 12px;
      padding: 12px;
      font-size: 0.9rem;
      font-weight: 700;
      color: white;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 6px;
      box-shadow: 0 4px 12px rgba(59, 130, 246, 0.3);
      transition: all 0.2s ease;
    }

    .install-btn:hover {
      background-color: #2563eb;
    }

    .ios-install-guide {
      font-size: 0.8rem;
      color: var(--text-secondary);
      text-align: center;
      line-height: 1.4;
      padding: 12px;
      background-color: #334155;
      border-radius: 12px;
      border: 1px solid var(--border-color);
    }

    /* 2択トグルボタン */
    .mode-select-grid {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 12px;
      margin-bottom: 8px;
    }

    .mode-btn {
      background-color: #334155;
      border: 2px solid transparent;
      border-radius: 14px;
      padding: 14px 8px;
      color: var(--text-main);
      cursor: pointer;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 4px;
      transition: all 0.2s ease;
    }

    .mode-btn.active {
      background-color: var(--primary);
      border-color: var(--primary-hover);
      box-shadow: 0 4px 12px var(--primary-glow);
    }

    .mode-title {
      font-size: 0.95rem;
      font-weight: 700;
    }

    .mode-desc {
      font-size: 0.7rem;
      opacity: 0.85;
    }

    /* アップロードエリア */
    .dropzone {
      border: 2px dashed var(--border-color);
      border-radius: 16px;
      padding: 36px 16px;
      text-align: center;
      cursor: pointer;
      transition: all 0.2s ease;
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 12px;
    }

    .dropzone:hover {
      border-color: var(--primary);
      background-color: rgba(16, 185, 129, 0.03);
    }

    .dropzone.has-file {
      border-style: solid;
      border-color: var(--primary);
      background-color: rgba(16, 185, 129, 0.05);
    }

    .upload-icon {
      font-size: 2.5rem;
    }

    .upload-text {
      font-size: 0.95rem;
      font-weight: 600;
    }

    .upload-subtext {
      font-size: 0.75rem;
      color: var(--text-secondary);
    }

    .file-info {
      font-size: 0.9rem;
      color: var(--primary);
      font-weight: 700;
      margin-top: 4px;
      word-break: break-all;
    }

    /* 実行ボタン */
    .btn {
      width: 100%;
      border: none;
      border-radius: 16px;
      padding: 16px;
      font-size: 1rem;
      font-weight: 700;
      color: white;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 8px;
      transition: all 0.2s ease;
    }

    .btn-primary {
      background-color: var(--primary);
      box-shadow: 0 4px 15px var(--primary-glow);
    }

    .btn-primary:hover:not(:disabled) {
      background-color: var(--primary-hover);
    }

    .btn:disabled {
      background-color: #475569;
      color: #94a3b8;
      cursor: not-allowed;
      box-shadow: none;
    }

    /* プログレスバー */
    .progress-container {
      display: flex;
      flex-direction: column;
      gap: 8px;
      margin-top: 8px;
    }

    .progress-header {
      display: flex;
      justify-content: space-between;
      font-size: 0.8rem;
      font-weight: 600;
    }

    .progress-track {
      background-color: #334155;
      height: 10px;
      border-radius: 9999px;
      overflow: hidden;
    }

    .progress-bar {
      background-color: var(--primary);
      width: 0%;
      height: 100%;
      border-radius: 9999px;
      transition: width 0.2s ease;
    }

    /* 結果表示 */
    .result-section {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 16px;
      text-align: center;
    }

    .success-icon {
      font-size: 3rem;
      color: var(--primary);
    }

    .comparison-grid {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 16px;
      width: 100%;
      margin-top: 8px;
    }

    .comparison-col {
      background-color: #334155;
      border-radius: 12px;
      padding: 12px;
    }

    .comparison-label {
      font-size: 0.75rem;
      color: var(--text-secondary);
      display: block;
      margin-bottom: 4px;
    }

    .comparison-value {
      font-size: 1.1rem;
      font-weight: 700;
    }

    .hidden {
      display: none !important;
    }
  </style>
</head>
<body>

  <div class="app-container">
    <header>
      <h1>ライン動画ちっちゃ君</h1>
      <p>動画をLINEで送れるサイズに自動でぎゅっと圧縮！</p>
    </header>

    <div class="card">
      <!-- アプリインストールエリア -->
      <div id="installArea" class="install-area hidden">
        <button id="installBtn" class="install-btn hidden">
          📱 アプリとしてインストール
        </button>
        <p id="iosInstallGuide" class="ios-install-guide hidden">
          ※iPhoneの方は、画面下部の <strong>[↑] (共有ボタン)</strong> から<strong>『ホーム画面に追加』</strong>をタップしてください。
        </p>
      </div>

      <!-- 2択トグルボタン -->
      <div id="modeSection">
        <div class="mode-select-grid">
          <button type="button" id="modeHigh" class="mode-btn active">
            <span class="mode-title">高画質</span>
            <span class="mode-desc">30MB以内 (おすすめ)</span>
          </button>
          <button type="button" id="modeFast" class="mode-btn">
            <span class="mode-title">爆速・軽量</span>
            <span class="mode-desc">5MB以内 (縮小)</span>
          </button>
        </div>
      </div>

      <!-- 動画選択エリア -->
      <div id="uploadSection">
        <div class="dropzone" id="dropzone">
          <input type="file" id="fileInput" class="hidden" accept="video/*" style="display: none;">
          <div class="upload-icon">📤</div>
          <p class="upload-text" id="uploadText">① 動画を選ぶ</p>
          <p class="upload-subtext" id="uploadSubtext">タップして動画ファイルを選択してください</p>
          <p class="file-info hidden" id="fileInfo"></p>
        </div>
      </div>

      <!-- 圧縮実行ボタン -->
      <button id="startCompressBtn" class="btn btn-primary" disabled>
        ② ちっちゃくする！
      </button>

      <!-- 進行状況表示 -->
      <div id="progressSection" class="progress-container hidden">
        <div class="progress-header">
          <span id="progressStatus">ちっちゃくしています...</span>
          <span id="progressPercent">0%</span>
        </div>
        <div class="progress-track">
          <div class="progress-bar" id="progressBar"></div>
        </div>
        <p id="elapsedTime" style="font-size: 0.75rem; text-align: center; color: var(--text-secondary); margin-top: 4px;">経過時間: 0秒</p>
      </div>

      <!-- 完了・保存セクション -->
      <div id="resultSection" class="result-section hidden">
        <div class="success-icon">✅</div>
        <h3 style="font-size: 1.1rem; font-weight: 700;">ちっちゃくなりました！</h3>
        
        <div class="comparison-grid">
          <div class="comparison-col">
            <span class="comparison-label">圧縮前</span>
            <span class="comparison-value" id="beforeSizeVal">0.0 MB</span>
          </div>
          <div class="comparison-col">
            <span class="comparison-label">圧縮後</span>
            <span class="comparison-value" id="afterSizeVal" style="color: var(--primary);">0.0 MB</span>
          </div>
        </div>

        <button id="downloadBtn" class="btn btn-primary" style="margin-top: 12px;">
          動画を保存する
        </button>
        
        <button id="resetBtn" class="btn" style="background-color: transparent; border: 1px solid var(--border-color); margin-top: 4px;">
          🔄 別の動画をちっちゃくする
        </button>
      </div>
    </div>
  </div>

  <script type="module" src="/src/main.ts"></script>
</body>
</html>
