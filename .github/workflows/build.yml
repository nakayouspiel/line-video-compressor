name: Android Build

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    # 1. リポジトリのチェックアウト
    - name: Checkout repository
      uses: actions/checkout@v4

    # 2. Java 17 のセットアップ
    - name: Set up JDK 17
      uses: actions/setup-java@v4
      with:
        java-version: '17'
        distribution: 'temurin'

    # 3. Gradle 8.2 の明示的セットアップ (システムのデフォルトGradle 9.6.0等との衝突を完全防止)
    - name: Setup Gradle 8.2
      uses: gradle/actions/setup-gradle@v3
      with:
        gradle-version: 8.2

    # 4. APKのビルド実行 (セットアップしたGradle 8.2を直接呼び出してクリーンビルド)
    - name: Build debug APK
      run: gradle assembleDebug --stacktrace

    # 5. 生成された APK ファイルを GitHub の Artifacts へアップロード
    - name: Upload APK Artifact
      uses: actions/upload-artifact@v4
      with:
        name: line-video-chiccha-kun-debug-apk
        path: app/build/outputs/apk/debug/app-debug.apk
        retention-days: 7
